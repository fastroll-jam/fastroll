name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  packages: write

jobs:
  docker-image:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          version="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"
          echo "Image: ${image}:${version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "Published Docker image:"
            echo "- \`${{ steps.meta.outputs.image }}:latest\`"
            echo "- \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}\`"
            echo "- \`${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short_sha }}\`"
            echo ""
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
